repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Note: mypy disabled in pre-commit — run manually with `poetry run mypy --strict src/`
  # The mcp library has no type stubs, causing issues in isolated pre-commit envs.

  - repo: local
    hooks:
      - id: block-claude-attribution
        name: Block Claude Attribution
        entry: .pre-commit-hooks/block-claude-attribution.sh
        language: script
        stages: [commit-msg]
